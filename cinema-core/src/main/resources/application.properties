spring.application.name=cinema-core

spring.datasource.url=jdbc:postgresql://localhost:5433/cinema_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

cinema.booking.reserve-minutes=10
cinema.waitlist.first-delay-seconds=30
cinema.waitlist.second-delay-seconds=60

# gRPC clients used by cinema-core integration layer.
# If fail-open is true, core falls back to local safe defaults when a gRPC service is unavailable.
grpc.client.pricing.host=localhost
grpc.client.pricing.port=9090
grpc.client.loyalty.host=localhost
grpc.client.loyalty.port=9091
cinema.grpc.fail-open=true

# GraphQL schema is provided by cinema-contract-api.
dgs.graphql.schema-locations=classpath*:graphql/schema.graphqls
spring.graphql.schema.locations=classpath*:graphql/
spring.graphql.schema.file-extensions=.graphqls,.graphql
